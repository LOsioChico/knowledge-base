name: CI (lint → build → deploy)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One pipeline at a time per branch; never two concurrent runs racing on Pages.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 1. Fast blocking checks. Stops the pipeline if format/wikilinks are broken.
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install Quartz deps
        working-directory: quartz
        run: npm ci
      - name: Lint wikilinks
        working-directory: quartz
        run: npm run lint:wikilinks
      - name: Lint content (Pass 0)
        working-directory: scripts/audit-notes
        run: |
          if [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
            yarn lint:content
            yarn lint:format
          else
            npm install --no-audit --no-fund
            npm run lint:content
            npm run lint:format
          fi

  # 2. Build Quartz site. Skipped on pull_request: deploy is main-only.
  build:
    needs: lint
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: quartz
        run: npm ci
      - name: Build Quartz
        working-directory: quartz
        run: npx quartz build -d ../content
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  # 3. Deploy to GitHub Pages.
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
