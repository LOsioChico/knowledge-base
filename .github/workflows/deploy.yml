name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: quartz
        run: npm ci
      - name: Lint wikilinks (first-mention rule)
        working-directory: quartz
        run: npm run lint:wikilinks
      - name: Lint content (Pass 0 — em-dashes, frontmatter)
        working-directory: scripts/audit-notes
        run: |
          if [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
            yarn lint:content
          else
            npm install --no-audit --no-fund
            npm run lint:content
          fi
      - name: Build Quartz
        working-directory: quartz
        run: npx quartz build -d ../content
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
